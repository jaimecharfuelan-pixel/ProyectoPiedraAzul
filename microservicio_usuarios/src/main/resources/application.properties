spring.application.name=microservicio_usuarios
server.port=${SERVER_PORT:8080}

# Base de datos propia del microservicio
spring.datasource.url=jdbc:postgresql://db-usuarios:5432/db_usuarios
spring.datasource.username=piedrazul
spring.datasource.password=piedrazul123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Jackson: no fallar cuando un primitivo recibe null
spring.jackson.deserialization.fail-on-null-for-primitives=false

# RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin123

# Swagger / OpenAPI
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
