version: '3.9'

services:

  # ─────────────────────────────────────────
  # BASES DE DATOS
  # ─────────────────────────────────────────

  db-usuarios:
    image: postgres:15-alpine
    container_name: db_usuarios
    environment:
      POSTGRES_DB: db_usuarios
      POSTGRES_USER: piedrazul
      POSTGRES_PASSWORD: piedrazul123
    ports:
      - "5433:5432"
    volumes:
      - vol_db_usuarios:/var/lib/postgresql/data
      - ./microservicio_usuarios/BD_MSUsuarios.sql:/docker-entrypoint-initdb.d/BD_MSUsuarios.sql
    networks:
      - piedrazul-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piedrazul -d db_usuarios"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-agendamiento:
    image: postgres:15-alpine
    container_name: db_agendamiento
    environment:
      POSTGRES_DB: db_agendamiento
      POSTGRES_USER: piedrazul
      POSTGRES_PASSWORD: piedrazul123
    ports:
      - "5434:5432"
    volumes:
      - vol_db_agendamiento:/var/lib/postgresql/data
      - ./microservicio_agendamiento/BD_MSAgendamiento.sql:/docker-entrypoint-initdb.d/BD_MSAgendamiento.sql
    networks:
      - piedrazul-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piedrazul -d db_agendamiento"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-configuracion:
    image: postgres:15-alpine
    container_name: db_configuracion
    environment:
      POSTGRES_DB: db_configuracion
      POSTGRES_USER: piedrazul
      POSTGRES_PASSWORD: piedrazul123
    ports:
      - "5435:5432"
    volumes:
      - vol_db_configuracion:/var/lib/postgresql/data
      - ./microservicio_configuracion/BD_MSConfiguracion.sql:/docker-entrypoint-initdb.d/BD_MSConfiguracion.sql
    networks:
      - piedrazul-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piedrazul -d db_configuracion"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # RABBITMQ
  # ─────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"    # puerto AMQP que usan los microservicios
      - "15672:15672"  # panel web: http://localhost:15672 (admin/admin123)
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - vol_rabbitmq:/var/lib/rabbitmq
    networks:
      - piedrazul-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MICROSERVICIOS
  # ─────────────────────────────────────────

  microservicio-usuarios:
    build:
      context: ./microservicio_usuarios
      dockerfile: Dockerfile
    container_name: microservicio_usuarios
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-usuarios:5432/db_usuarios
      SPRING_DATASOURCE_USERNAME: piedrazul
      SPRING_DATASOURCE_PASSWORD: piedrazul123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
      SERVER_PORT: 8080
    depends_on:
      db-usuarios:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - piedrazul-net

  microservicio-agendamiento:
    build:
      context: ./microservicio_agendamiento
      dockerfile: Dockerfile
    container_name: microservicio_agendamiento
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-agendamiento:5432/db_agendamiento
      SPRING_DATASOURCE_USERNAME: piedrazul
      SPRING_DATASOURCE_PASSWORD: piedrazul123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
      MS_USUARIOS_URL: http://microservicio-usuarios:8080
      MS_CONFIGURACION_URL: http://microservicio-configuracion:8080
      SERVER_PORT: 8080
    depends_on:
      db-agendamiento:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      microservicio-usuarios:
        condition: service_started
      microservicio-configuracion:
        condition: service_started
    networks:
      - piedrazul-net

  microservicio-configuracion:
    build:
      context: ./microservicio_configuracion
      dockerfile: Dockerfile
    container_name: microservicio_configuracion
    ports:
      - "8083:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-configuracion:5432/db_configuracion
      SPRING_DATASOURCE_USERNAME: piedrazul
      SPRING_DATASOURCE_PASSWORD: piedrazul123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
      MS_USUARIOS_URL: http://microservicio-usuarios:8080
      SERVER_PORT: 8080
    depends_on:
      db-configuracion:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - piedrazul-net

  # ─────────────────────────────────────────
  # API GATEWAY
  # ─────────────────────────────────────────

  api-gateway:
    build:
      context: ./APIGateWay
      dockerfile: Dockerfile
    container_name: api_gateway
    ports:
      - "8080:8080"
    environment:
      MS_USUARIOS_URL: http://microservicio-usuarios:8080
      MS_AGENDAMIENTO_URL: http://microservicio-agendamiento:8080
      MS_CONFIGURACION_URL: http://microservicio-configuracion:8080
      SERVER_PORT: 8080
    depends_on:
      - microservicio-usuarios
      - microservicio-agendamiento
      - microservicio-configuracion
    networks:
      - piedrazul-net

# ─────────────────────────────────────────
# VOLÚMENES Y RED
# ─────────────────────────────────────────

volumes:
  vol_db_usuarios:
  vol_db_agendamiento:
  vol_db_configuracion:
  vol_rabbitmq:

networks:
  piedrazul-net:
    driver: bridge
