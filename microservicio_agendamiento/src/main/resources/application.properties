spring.application.name=microservicio_agendamiento
server.port=${SERVER_PORT:8080}

# Base de datos propia del microservicio
spring.datasource.url=jdbc:postgresql://db-agendamiento:5432/db_agendamiento
spring.datasource.username=piedrazul
spring.datasource.password=piedrazul123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin123

# URL de ms-configuracion para consultar jornadas
ms.configuracion.url=${MS_CONFIGURACION_URL:http://microservicio-configuracion:8080}
